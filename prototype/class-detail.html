<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTimetable — Class Detail</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<a href="01-home.html" class="brand-chip glass" style="text-decoration:none;"><span class="dot"></span> SmartTimetable</a>

<nav class="tab-bar glass">
  <a href="01-home.html" class="tab-item"><span class="tab-icon">&#127968;</span><span class="tab-label">Home</span></a>
  <a href="02-schedule.html" class="tab-item active"><span class="tab-icon">&#128197;</span><span class="tab-label">Schedule</span></a>
  <a href="06-report-form.html" class="tab-item"><span class="tab-icon">&#128681;</span><span class="tab-label">Report</span></a>
  <a href="08-admin-login.html" class="tab-item"><span class="tab-icon">&#128736;</span><span class="tab-label">Admin</span></a>
</nav>

<main>
  <div class="container page" id="pageContent">
    <p class="lead">Loading class…</p>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
const STATUS_MESSAGE = {
  "Confirmed": "This class is on as scheduled. No changes reported.",
  "Room Changed": "",
  "Cancelled": "No make-up session scheduled yet."
};

const id = qs("id");
const cls = id ? getClassById(id) : null;
const content = document.getElementById("pageContent");

if (!cls) {
  content.innerHTML = `
    <p class="lead">We couldn't find that class.</p>
    <a href="02-schedule.html" class="btn btn-secondary">Back to Schedule</a>
  `;
} else {
  const banner = cls.status === "Room Changed"
    ? (cls.note || `Moved to Room ${escapeHtml(cls.room)}.`)
    : (cls.note || STATUS_MESSAGE[cls.status] || "");

  const roomValue = cls.old_room
    ? `<span class="was">${escapeHtml(cls.old_room)}</span> ${escapeHtml(cls.room)}`
    : escapeHtml(cls.room);

  content.innerHTML = `
    <p class="breadcrumb">Home / My Schedule / ${escapeHtml(cls.course_code)}</p>
    <p class="eyebrow">${escapeHtml(formatSlots(cls))}</p>
    <h1>${escapeHtml(cls.class_name)}</h1>
    <p class="lead">${escapeHtml(cls.course_code)} &middot; Section ${escapeHtml(cls.section)}</p>

    <div class="glass status-banner ${statusClass(cls.status)}">
      <span>${escapeHtml(cls.status)}</span>
      <span class="small">${escapeHtml(banner)}</span>
    </div>

    <div class="glass detail-card">
      <div class="detail-grid">
        <div class="detail-field">
          <div class="label">Day &amp; Time</div>
          <div class="value">${escapeHtml(formatSlots(cls))}</div>
        </div>
        <div class="detail-field">
          <div class="label">Room</div>
          <div class="value">${roomValue}</div>
        </div>
        <div class="detail-field">
          <div class="label">Lecturer</div>
          <div class="value">${escapeHtml(cls.lecturer)}</div>
        </div>
        <div class="detail-field">
          <div class="label">Section</div>
          <div class="value">${escapeHtml(cls.section)}</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <a class="btn btn-primary" href="06-report-form.html?course=${encodeURIComponent(cls.course_code)}&room=${encodeURIComponent(cls.room)}">Report an Issue with This Class</a>
      <a class="btn btn-secondary" href="02-schedule.html">Back to Schedule</a>
    </div>
  `;
}
</script>

</body>
</html>
