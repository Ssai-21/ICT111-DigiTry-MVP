<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTimetable — Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<a href="index.html" class="brand-chip glass" style="text-decoration:none;"><span class="dot"></span> SmartTimetable</a>

<nav class="tab-bar glass">
  <a href="index.html" class="tab-item"><span class="tab-icon">&#127968;</span><span class="tab-label">Home</span></a>
  <a href="schedule.html" class="tab-item"><span class="tab-icon">&#128197;</span><span class="tab-label">Schedule</span></a>
  <a href="report.html" class="tab-item"><span class="tab-icon">&#128681;</span><span class="tab-label">Report</span></a>
  <a href="admin-login.html" class="tab-item active"><span class="tab-icon">&#128736;</span><span class="tab-label">Admin</span></a>
</nav>

<main>
  <div class="container page">
    <form id="loginForm" class="glass form-card login-card">
      <p class="eyebrow">Admin &amp; Lecturer Area</p>
      <h1 style="font-size: 1.4rem;">Log In</h1>
      <p class="hint" style="margin-bottom: 18px;">
        Demo mode: this prototype has no real authentication yet &mdash;
        any email and password will log you in and lead straight to the admin dashboard.
      </p>

      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" value="admin@ric.ac.th">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" value="demopass">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
    </form>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  setAdminLoggedIn();
  window.location.href = "admin-dashboard.html";
});
</script>

</body>
</html>
