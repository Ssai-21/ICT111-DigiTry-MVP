<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTimetable — Class Updated (Static Mockup)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="brand-chip glass"><span class="dot"></span> SmartTimetable</div>

<div class="tab-bar glass">
  <span class="tab-item"><span class="tab-icon">&#127968;</span><span class="tab-label">Home</span></span>
  <span class="tab-item"><span class="tab-icon">&#128197;</span><span class="tab-label">Schedule</span></span>
  <span class="tab-item"><span class="tab-icon">&#128681;</span><span class="tab-label">Report</span></span>
  <span class="tab-item active"><span class="tab-icon">&#128736;</span><span class="tab-label">Admin</span></span>
</div>

<main>
  <div class="container page">
    <div class="glass confirm-wrap">
      <div class="confirm-icon">&#10003;</div>
      <h1>Class Updated</h1>
      <p class="lead" style="margin: 0 auto;">
        The status has been saved. Students viewing this class in their
        schedule will now see the updated status and notes.
      </p>
      <div class="btn-row" style="justify-content: center;">
        <span class="btn btn-primary">Back to Dashboard</span>
        <span class="btn btn-secondary">View Student-Facing Detail</span>
      </div>
    </div>
  </div>
</main>

</body>
</html>
