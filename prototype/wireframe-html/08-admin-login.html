<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTimetable — Admin Login (Static Mockup)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="brand-chip glass"><span class="dot"></span> SmartTimetable</div>

<div class="tab-bar glass">
  <span class="tab-item"><span class="tab-icon">&#127968;</span><span class="tab-label">Home</span></span>
  <span class="tab-item"><span class="tab-icon">&#128197;</span><span class="tab-label">Schedule</span></span>
  <span class="tab-item"><span class="tab-icon">&#128681;</span><span class="tab-label">Report</span></span>
  <span class="tab-item active"><span class="tab-icon">&#128736;</span><span class="tab-label">Admin</span></span>
</div>

<main>
  <div class="container page">
    <div class="glass form-card login-card">
      <p class="eyebrow">Admin &amp; Lecturer Area</p>
      <h1 style="font-size: 1.4rem;">Log In</h1>
      <p class="hint" style="margin-bottom: 18px;">
        Demo mode: this prototype has no real authentication yet &mdash;
        Log In leads straight to the admin dashboard.
      </p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" value="admin@ric.ac.th" readonly>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" value="demopass" readonly>
      </div>

      <span class="btn btn-primary" style="width: 100%;">Log In</span>
    </div>
  </div>
</main>

</body>
</html>
